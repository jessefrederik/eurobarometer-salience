name: parse-check

# Lightweight smoke test: confirm every R script parses. We do NOT run the full
# pipeline in CI (it needs the Eurostat API and, for the full tier, a GESIS
# account + microdata). Reproducibility of the environment is handled by renv.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
      - name: Parse all R scripts
        run: |
          Rscript -e '
            files <- list.files(".", pattern = "\\.R$", recursive = TRUE, full.names = TRUE)
            files <- files[!grepl("renv/", files)]
            ok <- TRUE
            for (f in files) {
              res <- tryCatch({ parse(f); TRUE },
                              error = function(e) { cat("FAIL", f, ":", conditionMessage(e), "\n"); FALSE })
              if (res) cat("ok  ", f, "\n")
              ok <- ok && res
            }
            if (!ok) quit(status = 1)
          '
